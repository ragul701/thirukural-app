<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiruvalluvar App</title>
<link rel="stylesheet" href="nav.css" />
<script src="auth.js"></script>
<script>
  requireLogin({ loginPage: "login.html" });
</script>

<style>
*, *::before, *::after { box-sizing: border-box; }
 
body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Segoe UI", Arial, sans-serif;
  color: #fff;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}

.bg-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(8, 12, 22, 0.25) 0%, rgba(8, 12, 22, 0.35) 40%, rgba(8, 12, 22, 0.72) 100%);
}

.content {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding: clamp(80px, 12vh, 100px) clamp(16px, 4vw, 24px) clamp(32px, 6vh, 56px);
}

.panel {
  width: min(400px, 100%);
  padding: clamp(24px, 5vw, 32px);
  border-radius: 20px;
  background: rgba(10, 15, 28, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
  display: flex;
  flex-direction: column;
  gap: 18px;
}

a {
  text-decoration: none;
  display: block;
}

button {
  width: 100%;
  padding: clamp(14px, 3vw, 16px);
  font-size: clamp(16px, 3.8vw, 18px);
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(135deg, rgba(255, 81, 47, 0.9), rgba(221, 36, 118, 0.9), rgba(36, 198, 220, 0.9));
  background-size: 200% 200%;
  animation: move 5s ease infinite;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0, 0, 0, 0.4);
}

@keyframes move {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@media (min-width: 768px) {
  .content {
    justify-content: center;
    padding-bottom: clamp(32px, 5vh, 48px);
  }

  .bg-overlay {
    background:
      linear-gradient(90deg, rgba(8, 12, 22, 0.15) 0%, rgba(8, 12, 22, 0.2) 50%, rgba(8, 12, 22, 0.55) 100%);
  }

  .panel {
    margin-left: auto;
    margin-right: clamp(24px, 6vw, 80px);
  }
}
  /* Header styling */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding: 16px;
    background: rgba(10, 15, 28, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }
  .app-title {
    margin: 0;
    font-size: clamp(24px, 5vw, 32px);
    color: #ffd56b;
    font-family: "Playfair Display", "Noto Sans Tamil", serif;
  }
  .search-wrapper {
    position: relative;
    width: 100%;
    max-width: 200px;
    margin-right: 12px;
  }

  .search-wrapper input {
    width: 100%;
    padding: 10px 40px 10px 14px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    font-size: 16px;
  }

  .search-wrapper input::placeholder {
    color: rgba(255, 255, 255, 0.6);
  }

  .search-wrapper button {
    position: absolute;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    font-size: 14px;
  }
  .toast.show { opacity: 1; }
  .kural-highlight {
    animation: highlight 3s ease-out;
  }
  @keyframes highlight {
    0% { box-shadow: 0 0 0 4px rgba(255, 213, 107, 0.7); }
    100% { box-shadow: none; }
  }
</style>

</head>

<body>
  <header class="app-header">
  <h1 class="app-title">Thiruvalluvar App</h1>
  <!-- Search input -->
  <div class="search-wrapper">
    <input id="searchInput" type="number" min="1" max="1330" placeholder="குறள் எண் (1‑1330)" />
    <button id="searchExecute" aria-label="Search"><span class="icon">🔍</span></button>
  </div>
  <div class="header-right">
    <div class="header-actions">
      <button id="profileBtn" aria-label="Profile"><span class="icon">👤</span></button>
      <button id="favBtn" aria-label="Favourite"><span class="icon">❤️</span></button>
      <button id="settingsBtn" aria-label="Settings"><span class="icon">⚙️</span></button>
    </div>
  </div>
</header>
<!-- Settings Modal -->
<div id="settingsModal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close" id="closeSettings">&times;</span>
    <h2>Profile Settings</h2>
    <form id="settingsForm">
      <label for="fullName">🧑‍💼 முழுப் பெயர்</label>
      <input type="text" id="fullName" required />
      <label for="email">📧 Email (Optional)</label>
      <input type="email" id="email" placeholder="example@mail.com" />
      <label for="bio">📝 Bio (Optional)</label>
      <textarea id="bio" rows="3"></textarea>
      <button type="submit">⚙️ சேமிக்கவும்</button>
    </form>
  </div>
</div>
<script>
  // Settings modal logic
  const settingsModal = document.getElementById('settingsModal');
  const settingsBtn = document.getElementById('settingsBtn');
  const closeSettings = document.getElementById('closeSettings');
  const settingsForm = document.getElementById('settingsForm');
  settingsBtn.addEventListener('click', () => settingsModal.style.display = 'block');
  closeSettings.addEventListener('click', () => settingsModal.style.display = 'none');
  window.addEventListener('click', (e) => { if (e.target === settingsModal) settingsModal.style.display = 'none'; });
  // Load existing user details into form
  const stored = JSON.parse(localStorage.getItem('userDetails') || '{}');
  if (stored.fullName) document.getElementById('fullName').value = stored.fullName;
  if (stored.email) document.getElementById('email').value = stored.email;
  if (stored.bio) document.getElementById('bio').value = stored.bio;
  settingsForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const data = {
      fullName: document.getElementById('fullName').value.trim(),
      email: document.getElementById('email').value.trim(),
      bio: document.getElementById('bio').value.trim()
    };
    const existing = JSON.parse(localStorage.getItem('userDetails') || '{}');
    const merged = { ...existing, ...data };
    localStorage.setItem('userDetails', JSON.stringify(merged));
    alert('Profile updated!');
    settingsModal.style.display = 'none';
  });
  // Favourite button logic (prompt for kural number)
  const favBtn = document.getElementById('favBtn');
  favBtn.addEventListener('click', () => {
    const k = prompt('விருப்ப குறளை சேர்க்க குறள் எண்ணை (1-1330) உள்ளிடவும்:');
    const num = parseInt(k, 10);
    if (!num || num < 1 || num > 1330) { alert('செல்லுபடியாகாத எண்ணு'); return; }
    const list = JSON.parse(localStorage.getItem('favouriteKurals') || '[]');
    if (!list.includes(num)) { 
      list.push(num); 
      localStorage.setItem('favouriteKurals', JSON.stringify(list)); 
      alert('விருப்ப குறள் சேர்ப்பட்டது!');
    } else { 
      alert('ஏற்கனவே சேர்க்கப்பட்டுள்ளது'); 
    }
  });
</script>

<div class="bg" aria-hidden="true">
  <img
    src="images/valluvar.jpg"
    alt=""
    onerror="this.onerror=null;this.src='images/thiruvalluvar.png';"
  />
  <div class="bg-overlay"></div>
</div>

<div class="content">
  <div class="panel">
    <a href="teach.html">
      <button>📘 ஆசிரியர் குறிப்பு</button>
    </a>

    <a href="about.html">
      <button>🌿 முப்பால் பகுப்பு</button>
    </a>
  </div>
</div>

<script src="nav.js"></script>
  <div id="toast" class="toast"></div>
  <script>
    const profileBtn = document.getElementById('profileBtn');
    const favBtn = document.getElementById('favBtn');
    const toast = document.getElementById('toast');
    const searchExecute = document.getElementById('searchExecute');
    const searchInput = document.getElementById('searchInput');

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function highlightKural(num) {
      const target = document.getElementById(`kural-${num}`) || document.querySelector(`[data-kural='${num}']`);
      if (!target) return false;
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.classList.add('kural-highlight');
      setTimeout(() => target.classList.remove('kural-highlight'), 3000);
      return true;
    }

    function performSearch() {
      if (!searchInput || !searchInput.value) {
        showToast('குறள் எண்ணை உள்ளிடவும்');
        return;
      }
      const val = parseInt(searchInput.value, 10);
      if (!val || val < 1 || val > 1330) {
        showToast('செல்லுபடியாகாத குறள் எண்');
        return;
      }
      if (!highlightKural(val)) {
        showToast('குறள் கிடைக்கவில்லை');
      }
    }

    searchExecute.addEventListener('click', performSearch);
    if (searchInput) {
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') performSearch();
      });
    }
  </script>
</body>
</html>
