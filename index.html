<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiruvalluvar App</title>
<link rel="stylesheet" href="nav.css" />
<script src="auth.js"></script>
<script>
  requireLogin({ loginPage: "login.html" });
</script>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  font-family: "Segoe UI", Arial, sans-serif;
  color: #fff;
  overflow-x: hidden;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}

.bg-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(8, 12, 22, 0.25) 0%, rgba(8, 12, 22, 0.35) 40%, rgba(8, 12, 22, 0.72) 100%);
}

.content {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding: clamp(80px, 12vh, 100px) clamp(16px, 4vw, 24px) clamp(32px, 6vh, 56px);
}

.panel {
  width: min(400px, 100%);
  padding: clamp(24px, 5vw, 32px);
  border-radius: 20px;
  background: rgba(10, 15, 28, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
  display: flex;
  flex-direction: column;
  gap: 18px;
}

a {
  text-decoration: none;
  display: block;
}

button {
  width: 100%;
  padding: clamp(14px, 3vw, 16px);
  font-size: clamp(16px, 3.8vw, 18px);
  font-weight: 700;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(135deg, rgba(255, 81, 47, 0.9), rgba(221, 36, 118, 0.9), rgba(36, 198, 220, 0.9));
  background-size: 200% 200%;
  animation: move 5s ease infinite;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(0, 0, 0, 0.4);
}

@keyframes move {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@media (min-width: 768px) {
  .content {
    justify-content: center;
    padding-bottom: clamp(32px, 5vh, 48px);
  }

  .bg-overlay {
    background:
      linear-gradient(90deg, rgba(8, 12, 22, 0.15) 0%, rgba(8, 12, 22, 0.2) 50%, rgba(8, 12, 22, 0.55) 100%);
  }

  .panel {
    margin-left: auto;
    margin-right: clamp(24px, 6vw, 80px);
  }
}
</style>

</head>

<body>

<div class="bg" aria-hidden="true">
  <img
    src="images/valluvar.jpg"
    alt=""
    onerror="this.onerror=null;this.src='images/thiruvalluvar.png';"
  />
  <div class="bg-overlay"></div>
</div>

<div class="content">
  <div class="panel">
    <a href="teach.html">
      <button>📘 ஆசிரியர் குறிப்பு</button>
    </a>

    <a href="about.html">
      <button>🌿 முப்பால் பகுப்பு</button>
    </a>
  </div>
</div>

<script src="nav.js"></script>
</body>
</html>
