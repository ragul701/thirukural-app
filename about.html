<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>முப்பால் பகுப்பு</title>
<link rel="stylesheet" href="nav.css" />
<script src="auth.js"></script>
<script>
  requireLogin({ loginPage: "login.html" });
</script>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #141e30, #243b55);
  font-family: Arial, sans-serif;
}

.box {
  width: min(400px, 92vw);
  padding: clamp(28px, 5vw, 36px) clamp(22px, 4vw, 28px);
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

a {
  text-decoration: none;
  display: block;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  background: linear-gradient(270deg, #ff512f, #dd2476, #24c6dc, #514a9d);
  background-size: 300% 300%;
  animation: move 4s ease infinite;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
}

@keyframes move {
  0% { background-position: 0%; }
  50% { background-position: 100%; }
  100% { background-position: 0%; }
}
</style>

</head>

<body>

<div class="box">
  <a href="aram.html">
    <button>🌿 அறத்துப்பால்</button>
  </a>

  <a href="porul.html">
    <button>💰 பொருட்பால்</button>
  </a>

  <a href="inbam.html">
    <button>❤️ இன்பத்துப்பால்</button>
  </a>
</div>

<script src="nav.js"></script>
</body>
</html>
