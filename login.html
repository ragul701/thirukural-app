<!DOCTYPE html>
<html lang="ta">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>உள்நுழைவு | திருக்குறள்</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="nav.css" />

  <style>
    *,
    *::before
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Noto Sans Tamil", Arial, sans-serif;
      color: #fff;
      background: #0c1222;
      overflow-x: hidden;
    }

    body.has-page-nav {
      padding-top: 62px;
    }

    .login-shell {
      display: flex;
      min-height: calc(100vh - 62px);
      min-height: calc(100dvh - 62px);
    }

    /* left — valluvar clearly visible */
    .hero-side {
      flex: 1.05;
      position: relative;
      min-height: 280px;
      overflow: hidden;
      background: linear-gradient(160deg, #1a2a4a, #0d3d4a);
    }

    .hero-side img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-side::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 55%, rgba(8, 12, 22, 0.55) 85%, rgba(8, 12, 22, 0.92) 100%),
        linear-gradient(0deg, rgba(8, 12, 22, 0.75) 0%, transparent 35%);
      pointer-events: none;
    }

    .hero-caption {
      position: absolute;
      left: clamp(20px, 4vw, 40px);
      bottom: clamp(24px, 5vw, 48px);
      z-index: 2;
      max-width: 360px;
    }

    .hero-caption h2 {
      font-family: "Playfair Display", "Noto Sans Tamil", serif;
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 700;
      margin: 0 0 8px;
      line-height: 1.1;
      background: linear-gradient(90deg, #ffe9a8, #ffd56b, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    .hero-caption p {
      margin: 0 0 16px;
      font-size: clamp(14px, 2.2vw, 16px);
      opacity: 0.92;
      line-height: 1.5;
    }

    .hero-caption .valluvar-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 213, 107, 0.18);
      border: 1px solid rgba(255, 213, 107, 0.45);
      font-size: clamp(13px, 2vw, 15px);
      font-weight: 700;
      color: #ffe9a8;
      backdrop-filter: blur(8px);
    }

    .quote-box {
      margin-top: 18px;
      border-left: 3px solid #ffd56b;
      padding: 12px 0 12px 16px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 0 12px 12px 0;
      backdrop-filter: blur(6px);
    }

    .quote-box p {
      margin: 0;
      font-size: clamp(14px, 2vw, 16px);
      line-height: 1.65;
    }

    .quote-box cite {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.65;
      font-style: normal;
    }

    /* right — login form */
    .form-side {
      flex: 0.95;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(20px, 4vw, 40px);
      background:
        radial-gradient(ellipse 80% 60% at 80% 20%, rgba(255, 170, 50, 0.08), transparent 50%),
        radial-gradient(ellipse 70% 50% at 20% 80%, rgba(36, 198, 220, 0.06), transparent 50%),
        linear-gradient(145deg, #0a0f1c 0%, #141e30 50%, #1a2744 100%);
    }

    .login-card {
      width: min(420px, 100%);
      padding: clamp(26px, 5vw, 38px) clamp(22px, 4vw, 34px);
      border-radius: clamp(20px, 4vw, 28px);
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 215, 120, 0.2);
      box-shadow:
        0 28px 64px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-header {
      text-align: center;
      margin-bottom: clamp(18px, 3vw, 24px);
    }

    .form-header .emblem {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd56b, #c9a227);
      font-size: 26px;
      box-shadow: 0 8px 24px rgba(255, 200, 80, 0.35);
      margin-bottom: 14px;
    }

    .form-header h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 30px);
      font-weight: 700;
      background: linear-gradient(90deg, #ff9a6c, #ff6b9d, #5ee7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Circular logo styling */
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 12px;
    }

    .subtitle {
      margin: 8px 0 0;
      font-size: clamp(13px, 3vw, 14px);
      opacity: 0.78;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      opacity: 0.92;
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.55;
      pointer-events: none;
    }

    input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.32);
      color: #fff;
      outline: none;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.38);
    }

    input:focus {
      border-color: rgba(255, 213, 107, 0.75);
      background: rgba(0, 0, 0, 0.42);
      box-shadow: 0 0 0 4px rgba(255, 213, 107, 0.14);
    }

    .msg {
      min-height: 22px;
      text-align: center;
      font-size: 13px;
      color: #ffb4b4;
      margin-bottom: 4px;
    }

    .msg.ok {
      color: #a8f0c8;
    }

    #loginBtn {
      width: 100%;
      padding: 15px;
      font-size: clamp(15px, 3.5vw, 17px);
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: #1a1208;
      background: linear-gradient(105deg, #ffd56b 0%, #ffb347 45%, #ff9a6c 100%);
      box-shadow: 0 10px 32px rgba(255, 180, 60, 0.38);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #loginBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(255, 180, 60, 0.5);
    }

    #loginBtn:active {
      transform: translateY(0);
    }

    .links {
      display: flex;
      justify-content: center;
      margin-top: 16px;
      font-size: 13px;
    }

    .links a {
      color: #9ee8ff;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .links a:hover {
      color: #ffd56b;
      background: rgba(255, 213, 107, 0.1);
    }

    /* mobile — valluvar full background */
    @media (max-width: 860px) {
      .login-shell {
        flex-direction: column;
        position: relative;
      }

      .hero-side {
        position: fixed;
        inset: 62px 0 0;
        z-index: 0;
        min-height: auto;
      }

      .hero-side::after {
        background:
          linear-gradient(180deg, rgba(8, 12, 22, 0.15) 0%, rgba(8, 12, 22, 0.55) 45%, rgba(8, 12, 22, 0.88) 100%);
      }

      .hero-caption {
        display: none;
      }

      .form-side {
        position: relative;
        z-index: 1;
        flex: 1;
        align-items: flex-end;
        padding: clamp(16px, 4vw, 24px);
        padding-bottom: clamp(24px, 6vw, 40px);
        background: transparent;
      }

      .login-card {
        background: rgba(10, 15, 28, 0.82);
        border-color: rgba(255, 215, 120, 0.25);
      }

      .mobile-brand {
        display: block;
        text-align: center;
        margin-bottom: 16px;
      }

      .mobile-brand h2 {
        font-family: "Playfair Display", "Noto Sans Tamil", serif;
        font-size: 26px;
        margin: 0 0 4px;
        background: linear-gradient(90deg, #ffe9a8, #ffd56b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .mobile-brand span {
        font-size: 13px;
        color: #ffe9a8;
        opacity: 0.9;
      }
    }

    @media (min-width: 861px) {
      .mobile-brand {
        display: none;
      }
    }

    @media (max-height: 700px) and (min-width: 861px) {
      .hero-caption .quote-box {
        display: none;
      }
    }
  </style>

  <script src="auth.js"></script>
</head>

<body>
  <div class="login-shell">
    <section class="hero-side" aria-hidden="true">
      <img src="images/valluvar.jpg" alt="திருவள்ளுவர்"
        onerror="this.onerror=null;this.src='images/thiruvalluvar.png';" />
      <div class="hero-caption">
        <span class="valluvar-name">🙏 திருவள்ளுவர்</span>
        <h2>திருக்குறள்</h2>
        <p>உலகப் பொதுமறை · 1330 குறள்கள் · அறம் · பொருள் · இன்பம்</p>
        <div class="quote-box">
          <p>அகர முதல எழுத்தெல்லாம் ஆதி<br />பகவன் முதற்றே உலகு.</p>
          <cite>— கடவுள் வாழ்த்து</cite>
        </div>
      </div>
    </section>

    <section class="form-side">
      <div class="login-card">
        <div class="mobile-brand">
          <h2>திருக்குறள்</h2>
          <span>திருவள்ளுவர் · உலகப் பொதுமறை</span>
        </div>

        <div class="form-header">
          <img src="images/valluvar.jpg" alt="Logo" class="logo" aria-hidden="true">
          <h1>உள்நுழைவு</h1>
          <p class="subtitle">Username மற்றும் Password உள்ளிடவும்</p>
        </div>

        <div class="field">

          <label for="username">Username</label>
          <div class="input-wrap">
            <input id="username" type="text" autocomplete="username" placeholder="உங்கள் பெயர்" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
          </div>
        </div>

        <div class="msg" id="msg"></div>

        <button id="loginBtn" type="button">உள்நுழை</button>

        <div class="links">
          <a href="#" id="clearBtn">அழி</a>
        </div>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const msg = $("msg");

    function setMsg(text, isOk) {
      msg.textContent = text || "";
      msg.classList.toggle("ok", !!isOk);
    }

    function doLogin() {
      const user = $("username").value.trim();
      const pass = $("password").value;

      if (!user || !pass) {
        setMsg("Username மற்றும் Password உள்ளிடவும்.");
        return;
      }

      login(user);
      setMsg("வெற்றிகரமாக உள்நுழைகிறீர்கள்…", true);

      const params = new URLSearchParams(location.search);
      const returnTo = params.get("returnTo");
      setTimeout(() => {
        location.replace(returnTo ? decodeURIComponent(returnTo) : "user.html");
      }, 400);
    }

    $("loginBtn").addEventListener("click", doLogin);
    $("clearBtn").addEventListener("click", (e) => {
      e.preventDefault();
      $("username").value = "";
      $("password").value = "";
      setMsg("");
      $("username").focus();
    });

    ["username", "password"].forEach((id) => {
      $(id).addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    });
  </script>
  <script src="nav.js"></script>
</body>

</html>
