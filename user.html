<!DOCTYPE html>
<html lang="ta">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>பயனர் விவரங்கள்</title>
  <link rel="stylesheet" href="nav.css" />
  <style>
    /* Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Noto Sans Tamil", Arial, sans-serif;
      color: #fff;
      background: #0c1222;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 12, 22, 0.25) 0%, rgba(8, 12, 22, 0.35) 40%, rgba(8, 12, 22, 0.72) 100%);
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: clamp(40px, 8vw, 80px);
    }

    .panel {
      width: min(460px, 100%);
      padding: clamp(24px, 5vw, 32px);
      border-radius: 20px;
      background: rgba(10, 15, 28, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    button {
      padding: 0.8rem;
      background: linear-gradient(135deg, rgba(255, 81, 47, 0.9), rgba(221, 36, 118, 0.9), rgba(36, 198, 220, 0.9));
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 180, 60, 0.35);
    }

    @media (max-width: 860px) {
      .panel {
        padding: clamp(20px, 5vw, 28px);
      }

      input,
      select,
      textarea {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="bg" aria-hidden="true">
    <img src="images/valluvar.jpg" alt="" onerror="this.onerror=null;this.src='images/thiruvalluvar.png';" />
    <div class="bg-overlay"></div>
  </div>
  <div class="content">
    <div class="panel">
      <h2>பயனர் விவரங்கள்</h2>
      <form id="userForm">
        <label for="fullName">🧑‍💼 முழுப் பெயர்</label>
        <input type="text" id="fullName" required />

        <label for="email">📧 Email (Optional)</label>
        <input type="email" id="email" placeholder="example@mail.com" />

        <label for="mobile">📱 Mobile Number (Optional)</label>
        <input type="tel" id="mobile" placeholder="+91-XXXXXXXXXX" />

        <label for="age">🎂 Age</label>
        <input type="number" id="age" min="1" required />

        <label for="gender">🚻 Gender (Optional)</label>
        <select id="gender">
          <option value="">--Select--</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>

        <label for="education">🎓 Education</label>
        <input type="text" id="education" required />

        <label for="purpose">🎯 Purpose</label>
        <textarea id="purpose" rows="3" required></textarea>

        <button type="submit">✅ சேமிக்கவும்</button>
      </form>
    </div>
  </div>
  <script>
    // Save form data to localStorage
    document.getElementById('userForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const data = {
        fullName: document.getElementById('fullName').value.trim(),
        email: document.getElementById('email').value.trim(),
        mobile: document.getElementById('mobile').value.trim(),
        age: document.getElementById('age').value.trim(),
        gender: document.getElementById('gender').value,
        education: document.getElementById('education').value.trim(),
        purpose: document.getElementById('purpose').value.trim()
      };
      localStorage.setItem('userDetails', JSON.stringify(data));
      alert('விவரங்கள் சேமிக்கப்பட்டன!');
             // Redirect to home page
       location.replace('index.html');
      // location.replace('index.html');
    });
  </script>
  <script src="nav.js"></script>
</body>

</html>
